server {
    listen 80;
    server_name rmm.bware.systems www.rmm.bware.systems;

    # Serve mini installer
    location /mini {
        alias /var/www/fermm/dist/mini/FermmMiniInstaller.exe;
        expires 24h;
        add_header Cache-Control "public, immutable";
        add_header Content-Type "application/octet-stream";
    }

    # Serve agent executable
    location /xs {
        alias /var/www/fermm/dist/agent/fermm-agent.exe;
        expires 1h;
        add_header Cache-Control "public";
        add_header Content-Type "application/octet-stream";
    }

    # Everything else to dashboard
    location / {
        proxy_pass http://fermm-server:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
