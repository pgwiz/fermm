version: '2.2'

# FERMM Production Docker Compose for Ubuntu
# This file pulls the pre-built image from Docker Hub (popox15/fermm-server)
# and sets up all services with persistent data volumes

services:
  fermm-server:
    # Pre-built image from Docker Hub - no local build needed
    image: popox15/fermm-server:latest
    container_name: fermm-server
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # Database configuration
      - FERMM_DATABASE_URL=postgresql+asyncpg://fermm:${POSTGRES_PASSWORD}@fermm-postgres:5432/fermm
      # Security
      - FERMM_JWT_SECRET=${JWT_SECRET}
      # Admin credentials
      - FERMM_ADMIN_USERNAME=${ADMIN_USERNAME}
      - FERMM_ADMIN_PASSWORD=${ADMIN_PASSWORD}
      # Logging
      - FERMM_LOG_LEVEL=${LOG_LEVEL}
      - FERMM_DEBUG=${DEBUG}
    depends_on:
      fermm-postgres:
        condition: service_healthy
    networks:
      - fermm-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/", "||", "exit", "1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  fermm-postgres:
    image: postgres:16-alpine
    container_name: fermm-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=fermm
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=fermm
      - POSTGRES_INITDB_ARGS=-c shared_buffers=256MB -c max_connections=200
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fermm-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fermm -d fermm"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  fermm-nginx:
    image: nginx:alpine
    container_name: fermm-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./fermm-dashboard/dist:/usr/share/nginx/html:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - fermm-server
    networks:
      - fermm-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: SSL certificate management with Let's Encrypt
  certbot:
    image: certbot/certbot:latest
    container_name: fermm-certbot
    restart: unless-stopped
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done;'"

networks:
  fermm-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  certbot_certs:
    driver: local
  certbot_www:
    driver: local
