version: '2.2'

services:
  fermm-server:
    # Use Docker Hub image (production)
    image: popox15/fermm-server:latest
    container_name: fermm-server
    restart: unless-stopped
    env_file: .env
    depends_on:
      fermm-postgres:
        condition: service_healthy
    networks:
      - fermm-network

  fermm-postgres:
    image: postgres:16-alpine
    container_name: fermm-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=fermm
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=fermm
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fermm"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - fermm-network

  nginx:
    image: nginx:alpine
    container_name: fermm-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./conf.d:/etc/nginx/conf.d:ro
      - ./fermm-dashboard/dist:/usr/share/nginx/html:ro
      - ./dist:/var/www/fermm/dist:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - fermm-server
    networks:
      - fermm-network

  # Optional: Let's Encrypt certificate renewal
  certbot:
    image: certbot/certbot
    container_name: fermm-certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

networks:
  fermm-network:
    driver: bridge

volumes:
  postgres_data:
  certbot_certs:
  certbot_www:
