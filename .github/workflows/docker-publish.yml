name: Build and Publish Docker Image

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            docker.io/${{ secrets.DOCKER_USERNAME }}/fermm-server
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./fermm-server/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
            VCS_REF=${{ github.sha }}

      - name: Image digest
        if: github.event_name != 'pull_request'
        run: echo "Image pushed: ${{ steps.meta.outputs.tags }}"

      - name: Build mini installer
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cd FermmMiniInstaller
          dotnet publish -c Release -o bin/publish
          
      - name: Upload mini installer to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: FermmMiniInstaller/bin/publish/FermmMiniInstaller.exe
          append_body: true
          body: |
            
            ### Mini Installer
            Download the lightweight FERMM mini installer:
            ```bash
            wget https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/FermmMiniInstaller.exe
            ./FermmMiniInstaller.exe /silent
            ```
            
            Or from CDN:
            ```bash
            wget https://rmm.bware.systems/mini -O installer.exe
            ./installer.exe /silent
            ```
            
            **Size:** 0.23 MB (fully self-contained)
            
            **Installation path:** %APPDATA%\Local\Microlens\
            
            See [MINI-INSTALLER-DEPLOYMENT.md](https://github.com/${{ github.repository }}/blob/main/md/MINI-INSTALLER-DEPLOYMENT.md) for details.
            
      - name: Create Release

        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          generate_release_notes: true
          body: |
            ## FERMM ${{ github.ref_name }} Release
            
            ### Docker Images
            
            **fermm-server:**
            ```bash
            docker pull ${{ secrets.DOCKER_USERNAME }}/fermm-server:${{ github.ref_name }}
            docker pull ${{ secrets.DOCKER_USERNAME }}/fermm-server:latest
            ```
            
            **Using in docker-compose.yml:**
            ```yaml
            services:
              fermm-server:
                image: ${{ secrets.DOCKER_USERNAME }}/fermm-server:${{ github.ref_name }}
              
              fermm-nginx:
                image: nginx:alpine
              
              fermm-postgres:
                image: postgres:16-alpine
            ```
            
            ### Quick Start
            ```bash
            git clone https://github.com/${{ github.repository }}.git
            cd fermm
            sudo docker-compose -f docker-compose.ubuntu-alt.yml up -d
            ```
            
            ### Domain Setup
            See [DOMAIN-ROUTING-COMPLETE.md](https://github.com/${{ github.repository }}/blob/main/md/DOMAIN-ROUTING-COMPLETE.md) for domain configuration.
            
            ### Changes
            Auto-generated release notes above.
